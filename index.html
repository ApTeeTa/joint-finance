<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1e3a5f">
  <meta name="description" content="Семейный учёт финансов">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Joint Finance">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/icon-192.png" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <title>Joint Finance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
            accent: { 500: '#10b981', 600: '#059669' }
          }
        }
      }
    }
  </script>
  <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/+esm"
      }
    }
  </script>
  <style>
    html {
      overflow-x: hidden;
      max-width: 100%;
    }

    body {
      overflow-x: hidden;
      overflow-y: auto;
      max-width: 100%;
      min-height: 100dvh;
      -webkit-overflow-scrolling: touch;
    }

    #app-header,
    #tab-content {
      min-width: 0;
    }

    #tab-nav {
      pointer-events: auto;
    }

    #tab-nav .tab-btn {
      pointer-events: auto;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    @media (max-width: 767px) {
      #tab-nav {
        overflow-x: visible;
        overflow-y: visible;
        touch-action: manipulation;
      }
    }

    @media (min-width: 768px) {
      #tab-nav {
        overflow-x: auto;
        touch-action: pan-x;
        scrollbar-width: thin;
      }
    }

    #tab-content {
      padding-bottom: max(1.5rem, env(safe-area-inset-bottom, 0px));
    }

    [data-modal].hidden {
      display: none !important;
      pointer-events: none !important;
    }

    .overflow-x-auto {
      touch-action: pan-x;
      -webkit-overflow-scrolling: touch;
    }

    .display-mode-root,
    .display-mode-list,
    .display-item,
    .display-item-shell,
    .display-item-body,
    .display-item-detail {
      transition: gap 180ms ease, padding 180ms ease, opacity 150ms ease, max-height 180ms ease;
    }

    .display-mode-list {
      min-width: 0;
    }

    .display-item {
      min-width: 0;
    }

    .display-item-shell {
      display: flex;
      align-items: stretch;
      gap: 0;
      min-width: 0;
    }

    .display-item-header {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      min-width: 0;
      width: 100%;
      overflow: visible;
    }

    .ui-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1rem;
      height: 1rem;
      flex-shrink: 0;
    }

    .ui-icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .display-item-body {
      flex: 1;
      min-width: 0;
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
      text-align: left;
      cursor: pointer;
      font: inherit;
      color: inherit;
    }

    .display-item-summary {
      display: flex;
      min-width: 0;
      width: 100%;
    }

    .display-item-title {
      font-weight: 600;
      color: rgb(15 23 42);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .display-item-meta {
      font-size: 0.75rem;
      color: rgb(100 116 139);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .display-item-value-wrap {
      flex-shrink: 0;
      min-width: 0;
      max-width: 45%;
    }

    .display-item-value {
      font-size: 0.875rem;
      font-weight: 600;
      color: rgb(15 23 42);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      display: inline-block;
    }

    .display-list-action {
      display: none;
    }

    .display-card-action {
      display: inline-flex;
    }

    [data-display-mode="compact"] .display-list-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1.75rem;
      min-height: 1.75rem;
      flex-shrink: 0;
    }

    [data-display-mode="compact"] .display-card-action {
      display: none;
    }

    [data-display-mode="compact"] .display-item-actions {
      flex-wrap: nowrap;
      gap: 0.125rem;
    }

    .display-item-stats {
      display: none;
      grid-template-columns: auto 1fr;
      gap: 0.25rem 1rem;
      font-size: 0.875rem;
      width: 100%;
      margin-top: 0.75rem;
    }

    .display-item-actions {
      display: flex;
      flex-shrink: 0;
      align-items: center;
      gap: 0.125rem;
      overflow: visible;
    }

    .display-item-actions > button,
    .display-item-actions > .display-overflow-menu > button[data-action="toggle-overflow-menu"] {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      padding: 0;
      flex-shrink: 0;
    }

    .display-overflow-menu {
      position: relative;
      z-index: 40;
      flex-shrink: 0;
    }

    .display-overflow-menu-panel {
      position: absolute;
      right: 0;
      top: calc(100% + 0.25rem);
      z-index: 60;
      display: none;
      flex-direction: column;
      align-items: stretch;
      min-width: 10rem;
      padding: 0.25rem 0;
      background: white;
      border: 1px solid rgb(226 232 240);
      border-radius: 0.5rem;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    }

    .display-overflow-menu-panel:not(.hidden) {
      display: flex;
    }

    .display-overflow-menu-panel button {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      height: auto;
      min-height: 2.25rem;
      padding: 0.5rem 0.75rem;
      justify-content: flex-start;
      white-space: nowrap;
      border-radius: 0;
    }

    .display-list-action {
      width: 1.75rem;
      height: 1.75rem;
      min-width: 1.75rem;
      min-height: 1.75rem;
    }

    .display-item-detail {
      min-width: 0;
    }

    .display-item-detail.is-open {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid rgb(241 245 249);
    }

    .display-item-detail-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.5rem;
    }

    [data-display-mode="compact"] .display-mode-list {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    [data-display-mode="compact"] .display-item {
      border: none;
      padding: 0;
      background: transparent;
    }

    [data-display-mode="compact"] .display-item-shell {
      border: 1px solid rgb(226 232 240);
      border-radius: 0.5rem;
      padding: 0.5rem 0.625rem;
      background: white;
    }

    [data-display-mode="compact"] .display-item-header {
      align-items: center;
      overflow: visible;
    }

    [data-display-mode="compact"] .display-item-actions {
      overflow: visible;
    }

    [data-display-mode="compact"] .display-item-summary {
      flex-direction: row;
      align-items: center;
      gap: 0.5rem;
    }

    [data-display-mode="compact"] .display-item-head {
      flex: 1;
      min-width: 0;
    }

    [data-display-mode="compact"] .display-item-value-wrap {
      flex-shrink: 0;
      max-width: 38%;
    }

    [data-display-mode="compact"] .display-item-open .display-item-shell {
      border-radius: 0.5rem 0.5rem 0 0;
    }

    [data-display-mode="compact"] .display-item-detail.is-open {
      margin-top: 0;
      padding: 0.625rem 0.75rem;
      border: 1px solid rgb(226 232 240);
      border-top: none;
      border-radius: 0 0 0.5rem 0.5rem;
      background: rgb(248 250 252);
    }

    [data-display-mode="medium"] .display-mode-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
    }

    [data-display-mode="medium"] .display-item,
    [data-display-mode="large"] .display-item {
      position: relative;
      border: 1px solid rgb(226 232 240);
      border-radius: 0.75rem;
      padding: 1rem;
      overflow: visible;
    }

    [data-display-mode="medium"] .display-item-header,
    [data-display-mode="large"] .display-item-header {
      position: relative;
      align-items: flex-start;
      overflow: visible;
      z-index: 3;
    }

    .display-item-header--safe-layout {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 0.375rem;
    }

    .display-item-header--safe-layout .display-item-body {
      flex: 1;
      min-width: 0;
    }

    .display-item-header--safe-layout .display-item-actions {
      position: static;
      flex-shrink: 0;
      align-self: flex-start;
      max-width: none;
    }

    [data-display-mode="medium"] .display-item-body,
    [data-display-mode="large"] .display-item-body {
      cursor: pointer;
      min-width: 0;
      width: 100%;
      padding-right: 0;
    }

    [data-display-mode="medium"] .display-item-shell,
    [data-display-mode="large"] .display-item-shell {
      flex-direction: column;
      min-width: 0;
    }

    [data-display-mode="medium"] .display-item-summary,
    [data-display-mode="large"] .display-item-summary {
      flex-direction: column;
      align-items: stretch;
      min-width: 0;
    }

    [data-display-mode="medium"] .display-item-head,
    [data-display-mode="large"] .display-item-head {
      min-width: 0;
      padding-right: 0;
    }

    [data-display-mode="medium"] .display-item-title,
    [data-display-mode="large"] .display-item-title {
      white-space: normal;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    [data-display-mode="medium"] .display-item-meta,
    [data-display-mode="large"] .display-item-meta {
      white-space: normal;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    [data-display-mode="medium"] .display-item-value-wrap,
    [data-display-mode="large"] .display-item-value-wrap {
      margin-top: 0.5rem;
      max-width: 100%;
    }

    [data-display-mode="medium"] .display-item-value,
    [data-display-mode="large"] .display-item-value {
      font-size: 1.125rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    [data-display-mode="medium"] .display-item-stats,
    [data-display-mode="large"] .display-item-stats {
      display: grid;
      min-width: 0;
    }

    [data-display-mode="medium"] .display-item-actions,
    [data-display-mode="large"] .display-item-actions {
      position: static;
      flex-wrap: nowrap;
      justify-content: flex-end;
      gap: 0.125rem;
      z-index: 4;
      overflow: visible;
    }

    [data-display-mode="medium"] .display-list-action,
    [data-display-mode="large"] .display-list-action {
      display: none;
    }

    [data-display-mode="medium"] .display-card-action,
    [data-display-mode="large"] .display-card-action {
      display: inline-flex;
    }

    @media (max-width: 640px) {
      [data-display-mode="medium"] .display-item {
        padding: 0.875rem;
      }

      [data-display-mode="medium"] .display-item-value {
        font-size: 1rem;
      }
    }

    [data-display-mode="large"] .display-mode-list {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 1.25rem;
    }

    [data-display-mode="large"] .display-item {
      padding: 1.5rem;
    }

    [data-display-mode="large"] .display-item-value {
      font-size: 1.25rem;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 overflow-x-hidden">

  <header id="app-header" class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-20">
    <div class="max-w-4xl mx-auto px-4 py-4 min-w-0">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between mb-4">
        <h1 class="text-xl font-bold text-slate-900 shrink-0">Joint Finance</h1>
        <div class="flex gap-2 shrink-0" id="profile-selector">
          <button
            type="button"
            data-profile="husband"
            class="profile-btn px-4 py-2 min-h-[44px] rounded-lg text-sm font-medium transition-colors"
          >Муж</button>
          <button
            type="button"
            data-profile="wife"
            class="profile-btn px-4 py-2 min-h-[44px] rounded-lg text-sm font-medium transition-colors"
          >Жена</button>
        </div>
      </div>

      <div class="grid grid-cols-3 gap-2 sm:gap-3 mb-4 min-w-0">
        <div class="bg-slate-50 rounded-xl p-2 sm:p-3 text-center min-w-0">
          <p class="text-xs text-slate-500 mb-1 truncate">Общий баланс</p>
          <p id="total-balance" class="text-base sm:text-lg font-semibold text-slate-900 truncate">0 ₽</p>
        </div>
        <div class="bg-emerald-50 rounded-xl p-2 sm:p-3 text-center min-w-0">
          <p class="text-xs text-emerald-600 mb-1 truncate">Свободно</p>
          <p id="free-balance" class="text-base sm:text-lg font-semibold text-emerald-700 truncate">0 ₽</p>
        </div>
        <div class="bg-amber-50 rounded-xl p-2 sm:p-3 text-center min-w-0">
          <p class="text-xs text-amber-600 mb-1 truncate">Зарезервировано</p>
          <p id="reserved-balance" class="text-base sm:text-lg font-semibold text-amber-700 truncate">0 ₽</p>
        </div>
      </div>

      <nav
        class="grid grid-cols-3 gap-1 sm:grid-cols-4 md:flex md:flex-nowrap md:overflow-x-auto md:pb-1 -mx-1 px-1"
        id="tab-nav"
        aria-label="Навигация"
      >
        <button type="button" data-tab="accounts" class="tab-btn w-full md:w-auto whitespace-nowrap px-2 sm:px-3 py-2.5 min-h-[44px] rounded-lg text-xs sm:text-sm font-medium transition-colors text-left md:text-center">Счета</button>
        <button type="button" data-tab="categories" class="tab-btn w-full md:w-auto whitespace-nowrap px-2 sm:px-3 py-2.5 min-h-[44px] rounded-lg text-xs sm:text-sm font-medium transition-colors text-left md:text-center">Категории</button>
        <button type="button" data-tab="history" class="tab-btn w-full md:w-auto whitespace-nowrap px-2 sm:px-3 py-2.5 min-h-[44px] rounded-lg text-xs sm:text-sm font-medium transition-colors text-left md:text-center">История</button>
        <button type="button" data-tab="obligations" class="tab-btn w-full md:w-auto whitespace-nowrap px-2 sm:px-3 py-2.5 min-h-[44px] rounded-lg text-xs sm:text-sm font-medium transition-colors text-left md:text-center">Обязательства</button>
        <button type="button" data-tab="savings" class="tab-btn w-full md:w-auto whitespace-nowrap px-2 sm:px-3 py-2.5 min-h-[44px] rounded-lg text-xs sm:text-sm font-medium transition-colors text-left md:text-center">Копилки</button>
        <button type="button" data-tab="debts" class="tab-btn w-full md:w-auto whitespace-nowrap px-2 sm:px-3 py-2.5 min-h-[44px] rounded-lg text-xs sm:text-sm font-medium transition-colors text-left md:text-center">Долги</button>
        <button type="button" data-tab="stats" class="tab-btn w-full md:w-auto whitespace-nowrap px-2 sm:px-3 py-2.5 min-h-[44px] rounded-lg text-xs sm:text-sm font-medium transition-colors text-left md:text-center col-span-3 sm:col-span-4 md:col-span-1">Статистика</button>
      </nav>
    </div>
  </header>

  <main id="tab-content" class="relative z-0 max-w-4xl mx-auto px-4 py-6 min-w-0 overflow-x-hidden">
  </main>

  <div id="modal-root" aria-hidden="true"></div>

  <script type="module" src="src/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch((err) => {
          console.warn('Service worker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
