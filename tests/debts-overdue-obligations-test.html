<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Тесты: просроченные обязательства в долгах</title>
  <style>
    body { font-family: sans-serif; padding: 1rem; }
    .pass { color: green; }
    .fail { color: red; }
  </style>
</head>
<body>
  <h1>Просроченные обязательства во вкладке «Долги»</h1>
  <pre id="out"></pre>
  <script type="module">
    import {
      getOverdueObligations,
      isObligationOverdue,
      formatOverdueDaysLabel,
      getOverdueDays
    } from '../src/modules/obligations.js';
    import { recordObligationPayment, todayIso } from '../src/modules/transactions.js';

    const out = document.getElementById('out');

    function log(line, cls = '') {
      const div = document.createElement('div');
      div.className = cls;
      div.textContent = line;
      out.appendChild(div);
    }

    function assert(c, m) { if (!c) throw new Error(m); }

    function addDays(iso, days) {
      const [y, m, d] = iso.split('-').map(Number);
      const date = new Date(y, m - 1, d);
      date.setDate(date.getDate() + days);
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    function createState() {
      return {
        profile: 'husband',
        exchangeRate: 92,
        accounts: [{ id: 'acc', name: 'A', currency: 'RUB', balance: 100000, owner: 'husband' }],
        obligations: [],
        transactions: [],
        categories: [],
        savings: [],
        debts: []
      };
    }

    function addObligation(state, name, paidUntil) {
      const o = {
        id: crypto.randomUUID(),
        name,
        accountId: 'acc',
        reserveAmount: 0,
        paidUntil,
        status: 'active',
        createdAt: new Date().toISOString()
      };
      state.obligations.push(o);
      return o;
    }

    async function run(name, fn) {
      try {
        await fn();
        log(`PASS  ${name}`, 'pass');
      } catch (e) {
        log(`FAIL  ${name}: ${e.message}`, 'fail');
      }
    }

    await run('Тест 1. Просрочка в прошлом', () => {
      const state = createState();
      addObligation(state, 'Интернет', addDays(todayIso(), -5));
      const overdue = getOverdueObligations(state);
      assert(overdue.length === 1, 'должно быть 1');
      assert(overdue[0].name === 'Интернет', 'название');
      assert(overdue[0].overdueDays === 5, `дней=${overdue[0].overdueDays}`);
      assert(formatOverdueDaysLabel(5) === 'Просрочено 5 дней', formatOverdueDaysLabel(5));
    });

    await run('Тест 2. Сортировка и счётчик', () => {
      const state = createState();
      addObligation(state, 'A', addDays(todayIso(), -10));
      addObligation(state, 'B', addDays(todayIso(), -1));
      addObligation(state, 'C', addDays(todayIso(), -3));
      addObligation(state, 'OK', addDays(todayIso(), 10));
      const overdue = getOverdueObligations(state);
      assert(overdue.length === 3, `count=${overdue.length}`);
      assert(overdue[0].overdueDays === 1, 'first=1');
      assert(overdue[1].overdueDays === 3, 'second=3');
      assert(overdue[2].overdueDays === 10, 'third=10');
    });

    await run('Тест 2b. paidUntil сегодня — просрочка', () => {
      const state = createState();
      addObligation(state, 'Сегодня', todayIso());
      assert(isObligationOverdue(state.obligations[0]), 'overdue');
      assert(getOverdueDays(todayIso()) === 0, '0 days');
    });

    await run('Тест 3. due/active не попадают в список', () => {
      const state = createState();
      addObligation(state, 'Due', addDays(todayIso(), 5));
      addObligation(state, 'Active', addDays(todayIso(), 40));
      assert(getOverdueObligations(state).length === 0, 'empty');
    });

    await run('Тест 4. Оплата с будущей датой убирает из просрочки', () => {
      const state = createState();
      const o = addObligation(state, 'Квартплата', addDays(todayIso(), -3));
      o.reserveAmount = 5000;
      assert(getOverdueObligations(state).length === 1, 'before pay');
      const pay = recordObligationPayment(state, o.id, 1000, 'acc', addDays(todayIso(), 60), '', todayIso(), 'husband');
      assert(pay.ok, pay.error);
      assert(getOverdueObligations(state).length === 0, 'after pay');
    });

    await run('Тест 5. Удаление убирает из просрочки', () => {
      const state = createState();
      const o = addObligation(state, 'X', addDays(todayIso(), -2));
      assert(getOverdueObligations(state).length === 1, 'before');
      state.obligations = state.obligations.filter((i) => i.id !== o.id);
      assert(getOverdueObligations(state).length === 0, 'after delete');
    });

    log('\nГотово.');
  </script>
</body>
</html>
